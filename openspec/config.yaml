schema: spec-driven

context: |
  Tech stack: Next.js 16, TypeScript, Convex, Better Auth, Tailwind CSS, pnpm
  Runtime: Vercel (web UI), perpuskukaan.exe.xyz VM (bot/gateway)
  Chat gateway: OpenClaw for public Telegram, /api/public-agent/action for Convex bridge
  Database: Convex (source of truth for users, books, borrows, agent actions)
  Identity: Better Auth (Google OAuth) + userIdentities table (Telegram/WhatsApp channels)
  Conventions: conventional commits, Indonesian public-facing text, TDD with node:test
  Domain: P2P library/book sharing platform (Perpuskukaan)

